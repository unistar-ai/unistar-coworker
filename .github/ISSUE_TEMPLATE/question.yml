name: Question
description: Ask about usage, configuration, or upgrades
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Check [SUPPORT.md](https://github.com/unistar-ai/unistar-coworker/blob/main/SUPPORT.md) and [troubleshooting.md](https://github.com/unistar-ai/unistar-coworker/blob/main/docs/troubleshooting.md) before asking.
        There is no commercial SLA — community help only.

  - type: input
    id: version
    attributes:
      label: unistar-coworker version
      description: Output of `unistar-coworker --version`
      placeholder: "2.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - macOS arm64 (Apple Silicon)
        - Other (source build)
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - tar.gz (GitHub Release)
        - Docker
        - Source (cargo build)
    validations:
      required: false

  - type: textarea
    id: doctor_json
    attributes:
      label: doctor --json
      description: Paste output of `unistar-coworker doctor --json` if relevant (redact secrets)
      render: json
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do? What have you tried?
    validations:
      required: true

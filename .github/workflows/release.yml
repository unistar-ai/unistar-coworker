name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.triple }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.triple }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install LLVM lld (macOS)
        if: runner.os == 'macOS'
        run: brew install lld

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Package release
        run: ./scripts/package.sh
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
          PACKAGE_TRIPLE: ${{ matrix.triple }}

      - name: Generate SBOM (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-cyclonedx --locked
          BASENAME="unistar-coworker-${GITHUB_REF_NAME}-${{ matrix.triple }}"
          cargo cyclonedx --manifest-path crates/unistar-coworker/Cargo.toml \
            --all-features --format json --override-filename "${BASENAME}.sbom"
          mv "crates/unistar-coworker/${BASENAME}.sbom.json" "dist/${BASENAME}.sbom.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unistar-coworker-${{ matrix.triple }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks scan
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker (Linux)
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Check README/Cargo version sync
        run: ./scripts/check-versions.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Install Web UI deps
        working-directory: web-ui
        run: npm install

      - name: Typecheck Web UI
        working-directory: web-ui
        run: npx tsc --noEmit

      - name: Test Web UI
        working-directory: web-ui
        run: npm test

      - name: Build Web UI
        working-directory: web-ui
        run: npm run build:fast

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --features embed-web-ui -- -D warnings

      - name: cargo test
        run: cargo test --workspace --features embed-web-ui

  # Slim build without headless Chromium (chromiumoxide); default features stay on in release builds.
  rust-no-default-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker (Linux)
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Install Web UI deps
        working-directory: web-ui
        run: npm install

      - name: Build Web UI
        working-directory: web-ui
        run: npm run build:fast

      - name: cargo check --no-default-features
        run: cargo check --workspace --no-default-features

      - name: cargo test --no-default-features
        run: cargo test --workspace --no-default-features

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker (Linux)
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm install
          npm run build:fast

      - name: cargo build
        run: cargo build --workspace --features embed-web-ui

      - name: Install E2E deps
        working-directory: web-e2e
        run: npm install

      - name: Install Playwright Chromium
        working-directory: web-e2e
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        working-directory: web-e2e
        run: npm test
        env:
          CI: true
          UNISTAR_BIN: ${{ github.workspace }}/target/debug/unistar-coworker

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker build smoke
        run: docker build -t unistar-coworker:ci .

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check advisories
        run: cargo deny check advisories

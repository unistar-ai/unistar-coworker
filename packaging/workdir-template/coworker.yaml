# Active LLM preset — switch in Web UI Config tab or edit this / the sidecar
# `coworker.llm-profile` (written by the UI; gitignored under `.coworker/`).
llm_profile: ollama-local

llm:
  ollama-local:
    base_url: http://127.0.0.1:11434/v1
    model: gemma4:26b-a4b-it-qat
    context_limit: 64000
    max_thinking_tokens: 4096
    api_key: ollama
  qwen-27b:
    base_url: http://127.0.0.1:11434/v1
    model: qwen3.6:27b
    context_limit: 64000
    max_thinking_tokens: 4096
    api_key: ollama
  deepseek:
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    context_limit: 128000
    api_key: ${DEEPSEEK_API_KEY}

chat:
  workspace: .
  history_messages: 32

web:
  bind: 127.0.0.1:8787

storage:
  backend: sqlite
  path: .coworker/data/coworker.db
  wal: true

theme: light

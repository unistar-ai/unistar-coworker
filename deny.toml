# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# v2 denies vulnerability/unmaintained/unsound/notice by default; scope transitive unmaintained via:
unmaintained = "workspace"
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0"]
confidence-threshold = 0.8

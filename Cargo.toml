[package]
name = "unistar-coworker"
version = "0.2.0"
edition = "2021"
description = "Local GitHub ops secretary with TUI, MCP, and local LLM"
license = "MIT"

[[bin]]
name = "unistar-coworker"
path = "src/main.rs"

[features]
default = []
sqlite = ["dep:rusqlite"]

[dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
ratatui = "0.29"
regex = "1"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
unicode-width = "0.2"
uuid = { version = "1", features = ["serde", "v4"] }

rusqlite = { version = "0.34", optional = true, features = ["bundled"] }

[dev-dependencies]
tempfile = "3"

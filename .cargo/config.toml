# Faster local dev builds.
#
# Tips:
#   - Type-check only:  cargo check          (skips link — fastest loop)
#   - Run binary:       cargo build / cargo run
#   - Release deploy:   cargo build --release --features embed-web-ui
#
# Optional: brew install sccache && uncomment [build] rustc-wrapper below.

[profile.dev]
debug = 1
incremental = true
codegen-units = 256
# macOS / Linux: unpack debug info so the linker handles smaller objects.
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 0

# macOS — LLVM lld (Mach-O): brew install lld
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/lld/bin/ld64.lld"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/usr/local/opt/lld/bin/ld64.lld"]

# Linux x86_64 — mold (ELF only; not available on macOS): apt install mold
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Optional compile cache — uncomment after: brew install sccache
# [build]
# rustc-wrapper = "sccache"

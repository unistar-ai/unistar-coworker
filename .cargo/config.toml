# Faster local dev builds.
#
# Tips:
#   - Type-check only:  cargo check          (skips link — fastest loop)
#   - Run binary:       cargo build / cargo run
#   - Release deploy:   cargo build --release --features embed-web-ui
#
# Optional: brew install sccache && uncomment [build] rustc-wrapper below.

[profile.dev]
debug = 1
incremental = true
codegen-units = 256
# macOS / Linux: unpack debug info so the linker handles smaller objects.
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 0

# mold does NOT work as a macOS linker (rustc passes -dynamic etc.). Use split-debuginfo
# + codegen-units above, or install LLVM lld: brew install lld
#   rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
#
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]

# Linux x86_64 — enable after: apt install mold  /  brew install mold
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Optional compile cache — uncomment after: brew install sccache
# [build]
# rustc-wrapper = "sccache"

llm:
  base_url: http://localhost:11434/v1
  model: gemma4:26b-a4b-it-qat
  context_limit: 64000
  concurrency: 2
  structured_output: true
  max_output_tokens: 4096   # total budget (thinking + JSON) for gemma4 etc.
  think: true               # Ollama reasoning; set false to skip thinking
  max_thinking_tokens: 512  # soft cap via prompt (~128 words)
  log_page_lines: 80
  max_log_pages: 8

mcp:
  command: unistar-mcp
  args: ["--lazy"]
  env: {}

storage:
  backend: json
  path: ./data

schedule:
  daily_digest: "0 6 * * *"
  ci_rescan: "0 */4 * * *"
  main_guard: "*/30 * * * *"

workflows:
  daily-work:
    enabled: true
    skill: skills/daily-work/SKILL.md
  release-duty:
    enabled: false
    skill: skills/release-duty/SKILL.md
    schedule: "0 9 * * 1-5"
  main-guard:
    enabled: false
    skill: skills/main-guard/SKILL.md
  review-radar:
    enabled: false
    skill: skills/review-radar/SKILL.md

repos:
  - owner/repo

release:
  backport_label: needs-backport
  target_branches: []
  lookback_limit: 30

policy:
  auto_rerun_flaky: false
  auto_backport: false
  max_prs_per_repo: 20
  max_agent_turns: 12
  max_tool_calls_per_pr: 5

flaky:
  record_real_bugs: true
  fingerprint_fallback: error

output:
  export_digest_md: true
  digest_export_path: ./digests/{date}.md

llm:
  base_url: http://localhost:11434/v1
  model: gemma4:26b-a4b-it-qat
  context_limit: 64000
  # api_key: ollama

# GitHub/CI tools run in-process via `gh` (GithubHarness) — no MCP subprocess required.
github:
  gh_command: gh
  env: {}
  timeout_secs: 120
  # tool_timeouts:
  #   ci_get_failed_logs: 180

repos:
  - owner/repo

workflows:
  daily-work: {}

chat:
  workspace: .
  # prompt: prompts/chat.md   # system prompt; skills: from frontmatter or chat.skills
  # tool_mode: auto   # auto | lazy | native — see README
  # bash: { timeout_secs: 30, max_output_chars: 16000 }  # optional tuning
  # python: { timeout_secs: 30, max_output_chars: 16000, command: python3 }
  # web_fetch:
  #   timeout_secs: 30
  #   max_content_chars: 32000
  #   allow_localhost: true   # dev servers (localhost / 127.0.0.1)
  #   cache_ttl_secs: 60
  #   browser_timeout_secs: 60
  #   browser_wait_ms: 3000

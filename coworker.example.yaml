llm:
  base_url: http://localhost:11434/v1
  model: gemma4:26b-a4b-it-qat
  context_limit: 64000
  concurrency: 2
  structured_output: true
  max_output_tokens: 4096   # total budget (thinking + JSON) for gemma4 etc.
  think: true               # Ollama reasoning; set false to skip thinking
  max_thinking_tokens: 512
  reasoning_summary_tokens: 320   # think=false compression call output cap
  log_page_lines: 80
  max_log_pages: 8

mcp:
  command: unistar-mcp
  args: ["--lazy"]
  env: {}

storage:
  backend: json
  path: ./data

schedule:
  daily_digest: "0 6 * * *"
  ci_rescan: "0 */4 * * *"
  main_guard: "*/30 * * * *"

workflows:
  daily-work:
    enabled: true
    agent: agents/daily-work/AGENT.md
    skills:
      - skills/ci-triage/SKILL.md
      - skills/digest-style/SKILL.md
  release-duty:
    enabled: false
    agent: agents/release-duty/AGENT.md
    schedule: "0 9 * * 1-5"
  main-guard:
    enabled: false
    agent: agents/main-guard/AGENT.md
  review-radar:
    enabled: false
    agent: agents/review-radar/AGENT.md
  flaky-govern:
    enabled: false
    agent: agents/flaky-govern/AGENT.md
    schedule: "0 8 * * 1"
  oncall-handoff:
    enabled: false
    agent: agents/oncall-handoff/AGENT.md
  my-pr-brief:
    enabled: false
    agent: agents/my-pr-brief/AGENT.md
  ci-efficiency:
    enabled: false
    agent: agents/ci-efficiency/AGENT.md
    schedule: "0 7 * * 1"
  issue-triage:
    enabled: false
    agent: agents/issue-triage/AGENT.md
  security-digest:
    enabled: false
    agent: agents/security-digest/AGENT.md
  pr-hygiene:
    enabled: false
    agent: agents/pr-hygiene/AGENT.md
  release-notes:
    enabled: false
    agent: agents/release-notes/AGENT.md
  comment-assist:
    enabled: false
    agent: agents/comment-assist/AGENT.md
  merge-health:
    enabled: false
    agent: agents/merge-health/AGENT.md
    skills:
      - skills/pr-merge/SKILL.md
  light-review:
    enabled: false
    agent: agents/light-review/AGENT.md
  regression-link:
    enabled: false
    agent: agents/regression-link/AGENT.md
  breaking-sniff:
    enabled: false
    agent: agents/breaking-sniff/AGENT.md

hygiene:
  stale_days: 7
  large_pr_lines: 500

rules:
  - workflow: test-integration
    error~: timeout
    then: mark_flaky

main_guard:
  consecutive_failures: 2
  recent_runs: 15

repos:
  - owner/repo

release:
  backport_label: needs-backport
  target_branches: []
  lookback_limit: 30

policy:
  auto_rerun_flaky: false
  auto_backport: false
  max_prs_per_repo: 20
  max_agent_turns: 12
  max_tool_calls_per_pr: 5

flaky:
  record_real_bugs: true
  fingerprint_fallback: error

tui:
  theme: dark   # dark | light

chat:
  enabled: true
  agent: agents/chat/AGENT.md
  skills:
    - skills/github-ops-tone/SKILL.md
    - skills/ci-triage/SKILL.md
  # 0 = unlimited within max_duration_secs; harness anti-loop guards still apply.
  max_turns: 0
  max_tool_calls: 0
  max_duration_secs: 900
  llm_step_timeout_secs: 180   # abort one LLM step if thinking/JSON stalls
  history_messages: 24
  history_tokens: 0          # 0 = auto (~40% of input budget for prior session turns)
  compress_reasoning: true   # summarize long thinking via fast think=false LLM call
  reasoning_compress_min_chars: 480
  # When true, mutating chat tools (rerun/backport/comment) run without the approval popup.
  auto_approve_mutations: false
  # preferred_tools: omit to use built-in chat tool whitelist

output:
  export_digest_md: true
  digest_export_path: ./digests/{date}.md
  # slack_webhook: https://hooks.slack.com/services/...

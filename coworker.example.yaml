# Named LLM endpoints under `llm`; pick the active one with `llm_profile`.
# Switch presets in Web UI (Config tab). Last choice is saved to `coworker.llm-profile`.
#
# Reference tier: 25B+ local models (e.g. qwen3.6-27B, gemma4:26b-a4b), context_limit 64K–128K.
# Workspace-only minimum: see coworker.minimal.yaml
#
# llm_profile: gemma-26b
# llm:
#   gemma-26b:
#     base_url: http://localhost:11434/v1
#     model: gemma4:26b-a4b-it-qat
#     context_limit: 64000
#   qwen-27b:
#     base_url: http://localhost:11434/v1
#     model: qwen3.6:27b
#     context_limit: 64000
#   qwen-35b-a3b:
#     base_url: http://localhost:11434/v1
#     model: qwen3.6:35b-a3b
#     context_limit: 64000
#   deepseek:
#     base_url: https://api.deepseek.com/v1
#     model: deepseek-chat
#     context_limit: 128000
#     api_key: ${DEEPSEEK_API_KEY}

llm:
  default:
    base_url: http://localhost:11434/v1
    model: gemma4:26b-a4b-it-qat
    context_limit: 64000
    # api_key: ollama

# --- Optional: GitHub / CI (in-process GithubHarness via `gh`) ---
# github:
#   gh_command: gh
#   env: {}
#   timeout_secs: 120

chat:
  workspace: .
  # llm_step_timeout_secs: 180   # wall clock per LLM step (0 = unlimited)
  # reasoning_only_warn_secs: 30 # stop stream when only reasoning grows (0 = off)
  # prompt: prompts/chat.md   # system prompt; skills: from frontmatter or chat.skills
  tool_mode: auto   # auto | native — 25B+ reference; lazy if VRAM tight
  # bash: { timeout_secs: 30, max_output_chars: 16000 }  # optional tuning
  # python: { timeout_secs: 30, max_output_chars: 16000, command: python3 }
  # web_fetch:
  #   timeout_secs: 30
  #   max_content_chars: 32000
  #   allow_localhost: true   # dev servers (localhost / 127.0.0.1)
  #   cache_ttl_secs: 60
  #   browser_timeout_secs: 60
  #   browser_wait_ms: 3000
  #   chromium_path: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome


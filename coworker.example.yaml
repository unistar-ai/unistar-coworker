# Web UI: unistar-coworker serve  (default http://127.0.0.1:8787)
# For trusted local use only — keep bind on 127.0.0.1 unless you set auth_token.
web:
  bind: 127.0.0.1:8787
  # auth_token: your-secret   # LAN bind: require Authorization: Bearer on /api/* and /ws

# UI theme for TUI and Web (`dark` | `light` | `none` — Web treats `none` as `dark`)
theme: dark

